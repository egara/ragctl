services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: localrag-pgvector
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rag_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag_password}
      POSTGRES_DB: ${POSTGRES_DB:-rag_db}
    ports:
      - "0.0.0.0:${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-rag_user}", "-d", "${POSTGRES_DB:-rag_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
